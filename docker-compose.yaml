################################################################################
#                       PERSISTENT VOLUMES
################################################################################
volumes:
  redis-data:
  weaviate-data:

################################################################################
#                           DATA LAYER
################################################################################
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports: ["6379:6379"]        # host access (optional)

  weaviate:
    image: semitechnologies/weaviate:1.24.8
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: text2vec-openai
      ENABLE_MODULES: text2vec-openai,text2vec-huggingface
      OPENAI_APIKEY: ${OPENAI_API_KEY:-}
    volumes:
      - weaviate-data:/var/lib/weaviate
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports: ["8080:8080"]

################################################################################
#                           MCP SERVERS
################################################################################
  mcp-openshift:
    build: ./mcp-openshift
    environment:
      MCP_USERNAME: ${MCP_USERNAME:-admin}
      MCP_PASSWORD: ${MCP_PASSWORD:-secret}
      KUBECONFIG: /app/.kube/config
      PORT: 9000
    ports: ["9101:9000"]
    restart: unless-stopped

  mcp-fmp:
    build: ./mcp-fmp
    environment:
      PORT: 5000
      FMP_API_KEY: ${FMP_API_KEY}
    ports:
      - "${HOST_PORT:-9100}:5000"
    restart: unless-stopped

################################################################################
#                      AGENT API (FastAPI + LangGraph)
################################################################################
  agent-server:
    build:
      context: ./app          # code lives here
      dockerfile: ../Dockerfile   # Dockerfile at repo root
    env_file: .env
    environment:
      PYTHONPATH: /app               # ensure 'src' importable in reloader
      LANGCHAIN_TRACING_V2: "true"
      REDIS_URL: redis://redis:6379/0
      WEAVIATE_URL: http://weaviate:8080
      FMP_FASTAPI_URL: http://mcp-fmp:5000
      MCP_K8S_URL: http://mcp-openshift:9000
    volumes:
      - ./app:/app                   # live-reload during dev
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      weaviate:
        condition: service_started
      mcp-openshift:
        condition: service_started
      mcp-fmp:
        condition: service_started
    ports: ["8000:8000"]

################################################################################
#                           STREAMLIT UI
################################################################################
  ui:
    build: ./ui
    environment:
      BACKEND_URL: http://agent-server:8000
      AUTH_TOKEN: ${ADMIN_TOKEN:-supersecrettoken}
      STREAMLIT_SERVER_RUNONSAVE: "true"
    volumes:
      - ./ui:/app
    depends_on:
      agent-server:
        condition: service_started
    ports: ["8501:8501"]
